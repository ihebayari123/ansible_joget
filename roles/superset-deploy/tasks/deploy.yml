# roles/superset-deploy/tasks/deploy.yml

- name: Create volume for Superset home
  docker_volume:
    name: "{{ volume_superset }}"

- name: Check if Superset metadata database already exists
  shell: >
    docker exec {{ postgres_container_name }}
    psql -U {{ postgres_user }} -d {{ postgres_db }} -tAc
    "SELECT 1 FROM pg_database WHERE datname='{{ superset_db }}';"
  register: superset_db_check
  changed_when: false

- name: Create Superset metadata database (only if it doesn't exist)
  shell: >
    docker exec {{ postgres_container_name }}
    psql -U {{ postgres_user }} -d {{ postgres_db }} -c
    "CREATE DATABASE {{ superset_db }};"
  when: "'1' not in superset_db_check.stdout"

- name: Remove any stale directory at the superset config destination
  file:
    path: /tmp/superset_config.py
    state: absent

- name: Render superset_config.py to host
  template:
    src: superset_config.py.j2
    dest: /tmp/superset_config.py

- name: Run Superset DB migration, admin user creation, and init (one-off container)
  shell: >
    docker run --rm --network {{ network_name }}
    -v {{ volume_superset }}:/app/superset_home
    -v /tmp/superset_config.py:/app/pythonpath/superset_config.py:ro
    {{ superset_image }}:{{ superset_version }}
    /bin/bash -c "superset db upgrade &&
    superset fab create-admin --username {{ superset_admin_user }} --firstname Admin --lastname User --email {{ superset_admin_email }} --password {{ superset_admin_password }} || true &&
    superset init"
  register: superset_init
  changed_when: true

- name: Run Superset container
  docker_container:
    name: "{{ superset_container_name }}"
    image: "{{ superset_image }}:{{ superset_version }}"
    restart_policy: unless-stopped
    restart: true
    volumes:
      - "{{ volume_superset }}:/app/superset_home"
      - "/tmp/superset_config.py:/app/pythonpath/superset_config.py:ro"
    networks:
      - name: "{{ network_name }}"
    ports:
      - "{{ port_superset }}:8088"

- name: Wait for Superset to respond on its health endpoint
  shell: >
    docker exec {{ superset_container_name }}
    python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8088/health')"
  register: superset_health
  retries: 15
  delay: 10
  until: superset_health.rc == 0
