# roles/docker-app/tasks/deploy.yml

- name: Create Docker network
  docker_network:
    name: "{{ network_name }}"
    state: present

- name: Create volume for Postgres
  docker_volume:
    name: "{{ volume_postgres }}"

- name: Copy jwdb-postgres.sql init script to host
  copy:
    src: jwdb-postgres.sql
    dest: /tmp/jwdb-postgres.sql

- name: Run PostgreSQL container with init script mounted
  docker_container:
    name: "{{ postgres_container_name }}"
    image: "postgres:{{ postgres_version }}"
    restart_policy: unless-stopped
    env:
      POSTGRES_DB: "{{ postgres_db }}"
      POSTGRES_USER: "{{ postgres_user }}"
      POSTGRES_PASSWORD: "{{ postgres_password }}"
    volumes:
      - "{{ volume_postgres }}:/var/lib/postgresql/data"
      - "/tmp/jwdb-postgres.sql:/docker-entrypoint-initdb.d/jwdb-postgres.sql:ro"
    networks:
      - name: "{{ network_name }}"
    ports:
      - "{{ port_postgres }}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U {{ postgres_user }} -d {{ postgres_db }}"]
      interval: 10s
      retries: 10
      timeout: 5s

- name: Wait for Postgres container to be healthy
  shell: docker inspect -f '{{ '{{' }} .State.Health.Status {{ '}}' }}' {{ postgres_container_name }}
  register: pg_health
  retries: 10
  delay: 10
  until: pg_health.stdout == "healthy"

- name: Wait for schema import to complete (check table count)
  shell: >
    docker exec {{ postgres_container_name }}
    psql -U {{ postgres_user }} -d {{ postgres_db }} -tAc
    "SELECT count(*) FROM information_schema.tables WHERE table_schema='public';"
  register: table_count
  retries: 15
  delay: 10
  until: table_count.stdout.strip() | int >= 112

- name: Verify app_app table exists
  shell: >
    docker exec {{ postgres_container_name }}
    psql -U {{ postgres_user }} -d {{ postgres_db }} -tAc
    "SELECT to_regclass('public.app_app');"
  register: app_app_check
  failed_when: "'app_app' not in app_app_check.stdout"

- name: Verify seeded admin user exists
  shell: >
    docker exec {{ postgres_container_name }}
    psql -U {{ postgres_user }} -d {{ postgres_db }} -tAc
    "SELECT count(*) FROM dir_user WHERE username='admin';"
  register: admin_check
  failed_when: admin_check.stdout.strip() == "0"

- name: Create volume for Joget wflow data
  docker_volume:
    name: "{{ volume_joget }}"

- name: Copy PostgreSQL JDBC driver to host
  copy:
    src: postgresql-42.2.19.jar
    dest: /tmp/postgresql-42.2.19.jar

- name: Write app_datasource-postgresql.properties into the Joget volume
  shell: |
    docker run --rm -v {{ volume_joget }}:/opt/joget/wflow busybox sh -c "cat > /opt/joget/wflow/app_datasource-postgresql.properties" <<'EOF'
    workflowUser={{ postgres_user }}
    workflowPassword={{ postgres_password }}
    workflowDriver=org.postgresql.Driver
    workflowUrl=jdbc\:postgresql\://{{ postgres_container_name }}/{{ postgres_db }}
    EOF

- name: Activate the postgresql datasource profile
  shell: |
    docker run --rm -v {{ volume_joget }}:/opt/joget/wflow busybox sh -c "echo 'currentProfile=postgresql' > /opt/joget/wflow/app_datasource.properties"

- name: Run Joget container with PostgreSQL config and driver mounted
  docker_container:
    name: "{{ joget_container_name }}"
    image: "{{ joget_image }}:{{ joget_version }}"
    restart_policy: unless-stopped
    volumes:
      - "{{ volume_joget }}:/opt/joget/wflow"
      - "/tmp/postgresql-42.2.19.jar:/opt/joget/apache-tomcat-9.0.65/lib/postgresql-42.2.19.jar:ro"
    networks:
      - name: "{{ network_name }}"
    ports:
      - "{{ port_joget }}:8080"
